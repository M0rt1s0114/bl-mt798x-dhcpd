name: BL2 Build

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      REPO_URL:
        description: 'Source repository'
        required: true
        default: 'https://github.com/Yuzhii0718/bl-mt798x-dhcpd'
        type: string
      REPO_BRANCH:
        description: 'Repository branch'
        required: true
        default: 'master'
        type: string
      ATF_VERSION: 
        description: 'ATF versions'
        required: true
        default: '2025'
        type: choice
        options:
          - '2025'
          - 'SP1'
          - 'SP2'
      ATF_OC:
        description: 'Include mt7981/mt7986 OC profiles'
        required: false
        default: false
        type: boolean
      pub_release:
        description: 'Publish to GitHub Release'
        required: false
        default: 'true'
        type: boolean

env:
  REPO_URL: ${{ github.event.inputs.REPO_URL }}
  REPO_BRANCH: ${{ github.event.inputs.REPO_BRANCH }}
  TZ: Asia/Shanghai
  UPLOAD_ARTIFACT: true
  UPLOAD_RELEASE: true
  # Build configuration from inputs
  CONFIG_ATF_VERSION: ${{ github.event.inputs.ATF_VERSION || '2025' }}
  CONFIG_ATF_OC: ${{ github.event.inputs.ATF_OC || 'false' }}

jobs:
  build-atf:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:
      - name: Configuration check
        shell: bash
        run: |
          set -euo pipefail

          ATF_VERSION_IN="$CONFIG_ATF_VERSION"

          # Validate ATF_VERSION
          case "$ATF_VERSION_IN" in
            2025|SP1|SP2) ;;
            *)
              echo "Error: invalid ATF_VERSION: '$ATF_VERSION_IN' (expected 2025/SP1/SP2)" >&2
              exit 1
              ;;
          esac

          if [ "${{ github.event.inputs.pub_release }}" = "false" ]; then
            echo "UPLOAD_RELEASE=false" >> $GITHUB_ENV
          fi

      - name: Initialize build environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install git rename tar
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: Checkout source
        working-directory: /workdir
        run: |
          df -hT $PWD
          git clone $REPO_URL -b $REPO_BRANCH bl-mt798x-dhcpd
          ln -sf /workdir/bl-mt798x-dhcpd $GITHUB_WORKSPACE/bl-mt798x-dhcpd

      - name: Install ATF build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo -E apt-get -qq install $(cat bl-mt798x-dhcpd/depends/ubuntu-22.04)

      - name: Generate .config
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd

          # Generate .config for ATF build
          echo "# CONFIG_BUILD_FIP is not set" > .config
          echo "CONFIG_BUILD_ATF=y" >> .config
          echo "# CONFIG_BUILD_GPT is not set" >> .config

          # Version selection
          echo "# CONFIG_VERSION_2025 is not set" >> .config
          echo "# CONFIG_VERSION_SP1 is not set" >> .config
          echo "# CONFIG_VERSION_SP2 is not set" >> .config
          case "$CONFIG_ATF_VERSION" in
            2025) echo "CONFIG_VERSION_2025=y" >> .config ;;
            SP1) echo "CONFIG_VERSION_SP1=y" >> .config ;;
            SP2) echo "CONFIG_VERSION_SP2=y" >> .config ;;
          esac

          # SILENT and BUILD_LOG defaults
          echo "CONFIG_SILENT=y" >> .config
          echo "CONFIG_BUILD_LOG=y" >> .config

          # Run defconfig to fill in missing values
          make defconfig 2>&1 || true

          # Show final .config
          echo "=== Generated .config ==="
          cat .config
          echo "========================="

      - name: Prepare ATF inputs
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd

          if [ "$CONFIG_ATF_OC" = "true" ]; then
            if [ -d "mt798x_atf/mt7981" ]; then
              echo "Enable mt7981 OC profile"
              shopt -s dotglob nullglob
              cp -af mt798x_atf/mt7981/* mt798x_atf/ || true
            else
              echo "Warning: mt798x_atf/mt7981 not found, skipping"
            fi
            if [ -d "mt798x_atf/mt7986" ]; then
              echo "Enable mt7986 OC profile"
              shopt -s dotglob nullglob
              cp -af mt798x_atf/mt7986/* mt798x_atf/ || true
            else
              echo "Warning: mt798x_atf/mt7986 not found, skipping"
            fi
          else
            echo "OC profile not enabled (ATF_OC=false)"
          fi

      - name: Build ATF
        id: atf
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd
          chmod +x ./build.sh
          chmod +x ./compile_atf.sh
          # Use make build target
          make build 2>&1
          echo "FILE_DATE=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_ENV
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Organize files and rename
        id: organize
        if: env.UPLOAD_ARTIFACT == 'true' && !cancelled()
        shell: bash
        run: |
          set -euo pipefail
          cd bl-mt798x-dhcpd

          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")

          # Try to timestamp output_bl2 files
          if [ -d "output_bl2" ]; then
            rename "s/(.*)\.(.*)/\$1_${TIMESTAMP}.\$2/" output_bl2/* || true
          fi

          mkdir -p upload
          if [ -d "output_bl2" ]; then
            cp -r output_bl2/* upload/ || true
          fi

          # Also archive the entire mt798x_atf directory for reference if it exists
          if [ -d "mt798x_atf" ]; then
            tar -czf upload/mt798x_atf_${TIMESTAMP}.tar.gz mt798x_atf || true
          fi

          echo "status=success" >> $GITHUB_OUTPUT

      - name: Upload artifacts to Actions
        uses: actions/upload-artifact@main
        if: steps.organize.outputs.status == 'success' && !cancelled()
        with:
          name: ${{ env.FILE_DATE }}-bl2-preloader
          path: |
            bl-mt798x-dhcpd/upload/*

      - name: Generate release notes
        id: tag
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        shell: bash
        run: |
          set -euo pipefail
          touch release.txt

          echo "- Commit: ${{ github.sha }}" >> release.txt
          echo "- Source repo: ${{ env.REPO_URL }}" >> release.txt
          echo "- Branch: ${{ env.REPO_BRANCH }}" >> release.txt
          echo "- ATF version: $CONFIG_ATF_VERSION" >> release.txt
          if [ "$CONFIG_ATF_OC" = "true" ]; then
            echo "- OC profile: Enabled" >> release.txt
          else
            echo "- OC profile: Disabled" >> release.txt
          fi
          echo "- Build time: ${{ env.FILE_DATE }}" >> release.txt

          echo "" >> release.txt
          echo "---" >> release.txt
          echo "" >> release.txt
          echo "**PLEASE SEE THE README FOR USAGE INSTRUCTIONS AND DISCLAIMERS.**" >> release.txt
          echo "release_tag=${{ env.FILE_DATE }}-bl2-preloader" >> $GITHUB_OUTPUT
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2.1.0
        if: steps.tag.outputs.status == 'success' && !cancelled() && env.UPLOAD_RELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: bl-mt798x-dhcpd/upload/*
          release_name: ${{ env.FILE_DATE }}-bl2-preloader
          name: ${{ env.FILE_DATE }}-bl2-preloader
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
